<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Skilizee Scraper</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #F8FAFC;
      color: #0F172A;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #EC4899, #8B5CF6, #3B82F6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 900;
      font-size: 14px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .title {
      font-size: 14px;
      font-weight: 800;
      margin: 0;
    }
    .subtitle {
      font-size: 10px;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0;
      font-weight: 700;
    }
    .card {
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .info-text {
      font-size: 11px;
      color: #475569;
      line-height: 1.5;
      margin-top: 0;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      background: linear-gradient(90deg, #EC4899, #8B5CF6);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .status {
      font-size: 11px;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
      font-weight: 600;
    }
    .status.success {
      background: #DCFCE7;
      color: #15803D;
      border: 1px solid #BBF7D0;
    }
    .status.error {
      background: #FEE2E2;
      color: #B91C1C;
      border: 1px solid #FCA5A5;
    }
    .preview-card {
      margin-top: 12px;
      padding: 12px;
      border: 1px dashed #CBD5E1;
      border-radius: 8px;
      background: #F8FAFC;
      display: none;
      align-items: center;
      gap: 12px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
    }
    .preview-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #8B5CF6;
      object-fit: cover;
    }
    .preview-info {
      flex: 1;
      min-width: 0;
    }
    .preview-name {
      font-size: 12px;
      font-weight: 800;
      color: #0F172A;
      margin: 0 0 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-username {
      font-size: 10px;
      color: #64748B;
      font-weight: 600;
      margin: 0 0 6px 0;
    }
    .preview-stats {
      display: flex;
      gap: 12px;
      font-size: 9px;
      font-weight: 700;
      color: #475569;
    }
    .preview-stats b {
      color: #8B5CF6;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <div>
      <h1 class="title">Skilizee AI</h1>
      <p class="subtitle">Instagram Profile Sync</p>
    </div>
  </div>

  <div class="card">
    <p class="info-text">
      Open any public profile on <b>Instagram.com</b> (e.g. @skillizee.io), then click below to sync stats directly to your local dashboard.
    </p>
    <button id="sync-btn">Sync to Dashboard</button>
    <div id="status-box" class="status"></div>
    
    <div id="preview-box" class="preview-card">
      <img id="preview-pic" class="preview-avatar" src="" alt="Avatar">
      <div class="preview-info">
        <h3 id="preview-fullname" class="preview-name">-</h3>
        <p id="preview-user" class="preview-username">@username</p>
        <div class="preview-stats">
          <span>Followers: <b id="preview-followers">0</b></span>
          <span>Scraped Posts: <b id="preview-posts">0</b></span>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
